<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Be Mine?</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .container {
            text-align: center;
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 500px;
        }

        h1 {
            color: #764ba2;
            margin-bottom: 20px;
            font-size: 2.5em;
        }

        p {
            color: #333;
            font-size: 1.1em;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .button-group {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        button {
            padding: 12px 30px;
            font-size: 1em;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .yes-btn {
            background-color: #e74c3c;
            color: white;
        }

        .yes-btn:hover {
            background-color: #c0392b;
            transform: scale(1.05);
        }

        .no-btn {
            background-color: #95a5a6;
            color: white;
        }

        .no-btn:hover {
            background-color: #7f8c8d;
        }

        .message {
            margin-top: 30px;
            font-size: 1.2em;
            color: #27ae60;
            display: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>💕 Will You be my lovely one? 💕</h1>
        <p>You mean a lot to me, and I would love to spend more time with you. Will you be my special someone?</p>

        <div class="button-group">
            <button class="yes-btn" onclick="handleYes()">Yes! 😊</button>
            <button class="no-btn" onclick="handleNo()">No</button>
        </div>

        <div class="message" id="message">
            ✨ Yay! You just made me the happiest! ✨
        </div>
    </div>

    <script>
        function handleYes() {
            document.getElementById('message').style.display = 'block';
            document.querySelector('.button-group').style.display = 'none';
        }

        function handleNo() {
            alert('no problem u will be mine in futre! ');
        }
    </script>
</body>

</html>
